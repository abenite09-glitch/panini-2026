<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Álbum Panini · Mundial 2026</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#3B6D11" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Panini 2026" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1f07;
      --surface: #182f0b;
      --surface2: #1f3d0f;
      --border: rgba(151, 196, 89, 0.15);
      --border2: rgba(151, 196, 89, 0.3);
      --text: #e8f5d6;
      --text2: #a8c880;
      --text3: #6b9044;
      --green-bg: #1e4010;
      --green-border: #639922;
      --green-text: #97C459;
      --amber-bg: #3a2a08;
      --amber-border: #BA7517;
      --amber-text: #EF9F27;
      --red-bg: #3a0f0f;
      --red-border: #A32D2D;
      --red-text: #F09595;
      --accent: #3B6D11;
      --accent-light: #97C459;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    /* Header */
    .header {
      padding: 14px 16px 10px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .app-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent-light);
      letter-spacing: -0.3px;
    }

    .app-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .pct-badge {
      background: var(--green-bg);
      border: 0.5px solid var(--green-border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--green-text);
    }

    .progress-track {
      background: var(--surface2);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .stat {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 4px;
      text-align: center;
    }

    .stat-n {
      font-size: 16px;
      font-weight: 700;
    }

    .stat-n.g { color: var(--green-text); }
    .stat-n.r { color: var(--red-text); }
    .stat-n.a { color: var(--amber-text); }
    .stat-n.w { color: var(--text2); }

    .stat-l {
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1px;
    }

    /* Controls */
    .controls {
      padding: 10px 16px 8px;
      background: var(--surface);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      padding: 9px 12px 9px 36px;
      outline: none;
      -webkit-appearance: none;
    }

    .search-wrap input::placeholder { color: var(--text3); }
    .search-wrap input:focus { border-color: var(--green-border); }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text3);
      pointer-events: none;
    }

    .clear-btn {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--text2);
      font-size: 13px;
      padding: 9px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 4px;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      background: var(--bg);
      color: var(--text3);
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.f-all.active   { background: var(--surface2); color: var(--text); border-color: var(--border2); }
    .filter-btn.f-tengo.active { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .filter-btn.f-faltan.active{ background: var(--red-bg);   color: var(--red-text);   border-color: var(--red-border); }
    .filter-btn.f-rep.active   { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }

    /* Legend */
    .legend {
      padding: 6px 16px;
      display: flex;
      gap: 14px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text3);
    }

    .leg-dot {
      width: 9px;
      height: 9px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Count bar */
    .count-bar {
      padding: 5px 16px;
      font-size: 11px;
      color: var(--text3);
      flex-shrink: 0;
    }

    /* Grid */
    .grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
      gap: 6px;
    }

    .sticker {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      height: 56px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: var(--surface);
      transition: transform 0.1s;
      position: relative;
    }

    .sticker:active { transform: scale(0.9); }

    .sticker.owned    { background: var(--green-bg); border-color: var(--green-border); }
    .sticker.repeated { background: var(--amber-bg); border-color: var(--amber-border); }

    .s-num {
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
    }

    .sticker.owned    .s-num { color: var(--green-text); }
    .sticker.repeated .s-num { color: var(--amber-text); }

    .s-cnt {
      font-size: 10px;
      color: var(--text3);
      margin-top: 1px;
    }

    .sticker.owned    .s-cnt { color: var(--green-border); }
    .sticker.repeated .s-cnt { color: var(--amber-border); font-weight: 700; }

    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
      font-size: 14px;
    }

    /* Bottom sheet */
    .bottom-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .action-btn {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      padding: 9px 8px;
      border-radius: 10px;
      border: 0.5px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn.danger { color: var(--red-text); border-color: var(--red-border); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-height: 60dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 10px;
      border-bottom: 0.5px solid var(--border);
    }

    .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }

    .modal-close {
      font-size: 22px;
      color: var(--text3);
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .modal-body {
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    .tag-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .tag-miss { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
    .tag-rep  { background: var(--amber-bg); color: var(--amber-text); border: 0.5px solid var(--amber-border); }

    .empty-msg {
      color: var(--text3);
      font-size: 14px;
      text-align: center;
      padding: 2rem;
    }

    /* Install hint */
    .install-hint {
      display: none;
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      padding: 4px 16px;
      background: var(--surface);
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">⚽ Panini Mundial 2026</div>
        <div class="app-sub">Toca para marcar · Mantén para quitar</div>
      </div>
      <div class="pct-badge" id="pct">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n w" id="s-total">670</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n g" id="s-tengo">0</div><div class="stat-l">Tengo</div></div>
      <div class="stat"><div class="stat-n r" id="s-faltan">670</div><div class="stat-l">Faltan</div></div>
      <div class="stat"><div class="stat-n a" id="s-rep">0</div><div class="stat-l">Repetidas</div></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="number" id="search-input" placeholder="Buscar lámina..." min="1" max="670" inputmode="numeric" />
      </div>
      <button class="clear-btn" onclick="clearSearch()">Limpiar</button>
    </div>
    <div class="filters">
      <button class="filter-btn f-all active" onclick="setFilter('all')">Todas</button>
      <button class="filter-btn f-tengo" onclick="setFilter('tengo')">Tengo</button>
      <button class="filter-btn f-faltan" onclick="setFilter('faltan')">Faltan</button>
      <button class="filter-btn f-rep" onclick="setFilter('rep')">Repetidas</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--surface2);border:0.5px solid var(--border2)"></div>Falta</div>
    <div class="leg"><div class="leg-dot" style="background:var(--green-bg);border:0.5px solid var(--green-border)"></div>Tengo (1)</div>
    <div class="leg"><div class="leg-dot" style="background:var(--amber-bg);border:0.5px solid var(--amber-border)"></div>Repetida (2+)</div>
  </div>

  <!-- Count -->
  <div class="count-bar" id="count-bar">670 láminas</div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Bottom actions -->
  <div class="bottom-actions">
    <button class="action-btn" onclick="openModal('faltan')">📋 Faltantes</button>
    <button class="action-btn" onclick="openModal('rep')">🔄 Repetidas</button>
    <button class="action-btn danger" onclick="resetAll()">↺ Reiniciar</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div class="modal-body">
      <div class="tag-grid" id="modal-body"></div>
    </div>
  </div>
</div>

<script>
const TOTAL = 670;
let stickers = {};
let filter = 'all';
let search = '';

function load() {
  try {
    const raw = localStorage.getItem('panini-2026');
    if (raw) stickers = JSON.parse(raw);
  } catch(e) {}
  render();
}

function save() {
  try { localStorage.setItem('panini-2026', JSON.stringify(stickers)); } catch(e) {}
}

function stats() {
  const owned = Object.keys(stickers).filter(k => (stickers[k]||0) > 0).length;
  const rep = Object.values(stickers).filter(v => v > 1).length;
  return { owned, rep, missing: TOTAL - owned, pct: Math.round(owned / TOTAL * 100) };
}

function updateHeader() {
  const s = stats();
  document.getElementById('pct').textContent = s.pct + '%';
  document.getElementById('prog-fill').style.width = s.pct + '%';
  document.getElementById('s-tengo').textContent = s.owned;
  document.getElementById('s-faltan').textContent = s.missing;
  document.getElementById('s-rep').textContent = s.rep;
}

function visible() {
  const out = [];
  for (let i = 1; i <= TOTAL; i++) {
    const cnt = stickers[i] || 0;
    if (search && !String(i).startsWith(search)) continue;
    if (filter === 'tengo' && cnt === 0) continue;
    if (filter === 'faltan' && cnt > 0) continue;
    if (filter === 'rep' && cnt <= 1) continue;
    out.push(i);
  }
  return out;
}

function render() {
  updateHeader();
  const list = visible();
  document.getElementById('count-bar').textContent = list.length + ' láminas';
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  list.forEach(n => {
    const cnt = stickers[n] || 0;
    const div = document.createElement('div');
    div.className = 'sticker ' + (cnt === 0 ? '' : cnt === 1 ? 'owned' : 'repeated');
    div.dataset.n = n;
    div.innerHTML = `<div class="s-num">${n}</div><div class="s-cnt">${cnt === 0 ? '—' : cnt === 1 ? '✓' : '×' + cnt}</div>`;
    div.addEventListener('click', () => tap(n));
    let holdTimer;
    div.addEventListener('touchstart', () => { holdTimer = setTimeout(() => remove(n), 500); }, { passive: true });
    div.addEventListener('touchend', () => clearTimeout(holdTimer), { passive: true });
    div.addEventListener('contextmenu', e => { e.preventDefault(); remove(n); });
    frag.appendChild(div);
  });
  grid.innerHTML = '';
  grid.appendChild(frag);

  if (search) {
    const first = grid.querySelector('.sticker');
    if (first) first.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function updateSticker(n) {
  const el = document.querySelector(`.sticker[data-n="${n}"]`);
  if (!el) { render(); return; }
  const cnt = stickers[n] || 0;
  const hide = (filter === 'faltan' && cnt > 0) ||
               (filter === 'tengo' && cnt === 0) ||
               (filter === 'rep' && cnt <= 1);
  if (hide) { el.remove(); updateHeader(); return; }
  el.className = 'sticker ' + (cnt === 0 ? '' : cnt === 1 ? 'owned' : 'repeated');
  el.querySelector('.s-num').textContent = n;
  el.querySelector('.s-cnt').textContent = cnt === 0 ? '—' : cnt === 1 ? '✓' : '×' + cnt;
  updateHeader();
}

function tap(n) {
  stickers[n] = (stickers[n] || 0) + 1;
  save();
  updateSticker(n);
}

function remove(n) {
  if (!stickers[n]) return;
  stickers[n]--;
  if (stickers[n] === 0) delete stickers[n];
  save();
  updateSticker(n);
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.f-' + f).classList.add('active');
  render();
}

function clearSearch() {
  search = '';
  document.getElementById('search-input').value = '';
  render();
}

document.getElementById('search-input').addEventListener('input', e => {
  search = e.target.value.trim();
  render();
});

function openModal(type) {
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  if (type === 'faltan') {
    const list = [];
    for (let i = 1; i <= TOTAL; i++) if (!stickers[i]) list.push(i);
    title.textContent = `Faltantes (${list.length})`;
    body.innerHTML = list.length
      ? list.map(n => `<span class="tag tag-miss">${n}</span>`).join('')
      : '<div class="empty-msg">¡Album completo! 🏆</div>';
  } else {
    const list = [];
    for (let i = 1; i <= TOTAL; i++) if ((stickers[i]||0) > 1) list.push({ n: i, cnt: stickers[i] });
    title.textContent = `Repetidas (${list.length})`;
    body.innerHTML = list.length
      ? list.map(({ n, cnt }) => `<span class="tag tag-rep">${n} ×${cnt}</span>`).join('')
      : '<div class="empty-msg">Sin repetidas aún</div>';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function resetAll() {
  if (!confirm('¿Reiniciar el álbum? Se borra todo el progreso.')) return;
  stickers = {};
  save();
  render();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

load();
</script>
</body>
</html>
