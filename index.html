<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Álbum Panini · Mundial 2026</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0D47A1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Panini 2026"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060f1e;
  --s1:#0a1830;
  --s2:#0f2040;
  --s3:#162850;
  --bd:rgba(96,165,250,0.15);
  --bd2:rgba(96,165,250,0.32);
  --bda:rgba(96,165,250,0.5);
  --t:#dbeafe;
  --t2:#93c5fd;
  --t3:#4a7fba;
  --acc:#1d4ed8;
  --al:#60a5fa;
  --gbg:#052e16;--gbr:#16a34a;--gt:#4ade80;
  --abg:#431407;--abr:#ea580c;--at:#fb923c;
  --rbg:#3a0f0f;--rbr:#dc2626;--rt:#f87171;
  --foil:#F5E070;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--t)}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}

/* Header */
.hdr{padding:10px 14px 10px;background:var(--s1);border-bottom:0.5px solid var(--bd2);flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.logo-wrap{flex-shrink:0}
.app-info{flex:1}
.app-title{font-size:15px;font-weight:700;color:var(--al);letter-spacing:-0.3px}
.app-sub{font-size:10px;color:var(--t3);margin-top:1px}
.pct-badge{background:rgba(29,78,216,0.4);border:0.5px solid var(--bda);border-radius:20px;padding:3px 10px;font-size:14px;font-weight:700;color:var(--al)}
.prog-track{background:var(--s3);border-radius:4px;height:5px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--al));border-radius:4px;transition:width .4s}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.stat{background:var(--bg);border:0.5px solid var(--bd);border-radius:8px;padding:5px 3px;text-align:center}
.stat-n{font-size:15px;font-weight:700}
.stat-n.g{color:var(--gt)}.stat-n.r{color:var(--rt)}.stat-n.a{color:var(--at)}.stat-n.w{color:var(--al)}
.stat-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}

/* Controls */
.ctrl{padding:8px 14px 6px;background:var(--s1);flex-shrink:0;display:flex;flex-direction:column;gap:7px}
.row{display:flex;gap:7px;align-items:center}
.sw{flex:1;position:relative}
.sw input{width:100%;background:var(--bg);border:0.5px solid var(--bd2);border-radius:10px;color:var(--t);font-size:14px;padding:8px 10px 8px 32px;outline:none;-webkit-appearance:none}
.sw input::placeholder{color:var(--t3)}
.sw input:focus{border-color:var(--bda);box-shadow:0 0 0 3px rgba(96,165,250,0.12)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}
.team-sel{background:var(--bg);border:0.5px solid var(--bd2);border-radius:10px;color:var(--t);font-size:12px;padding:8px 8px;outline:none;flex:1;max-width:160px}
.team-sel option{background:#0a1830;color:var(--t)}
.clr{background:var(--s3);border:0.5px solid var(--bd);border-radius:10px;color:var(--t2);font-size:12px;padding:8px 10px;cursor:pointer;white-space:nowrap}
.filters{display:flex;gap:5px}
.fb{flex:1;font-size:11px;font-weight:500;padding:6px 3px;border-radius:8px;border:0.5px solid var(--bd);background:var(--bg);color:var(--t3);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.fb.fa.on{background:var(--s3);color:var(--t);border-color:var(--bd2)}
.fb.ft.on{background:var(--gbg);color:var(--gt);border-color:var(--gbr)}
.fb.ff.on{background:var(--rbg);color:var(--rt);border-color:var(--rbr)}
.fb.fr.on{background:var(--abg);color:var(--at);border-color:var(--abr)}

/* Legend & count */
.leg-bar{display:flex;gap:12px;padding:5px 14px;background:var(--s1);border-bottom:0.5px solid var(--bd);flex-shrink:0;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3)}
.ldot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.cbar{padding:4px 14px;font-size:11px;color:var(--t3);flex-shrink:0;background:var(--bg)}

/* Grid */
.gwrap{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch}
.team-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;padding:8px 2px 4px;border-bottom:0.5px solid var(--bd);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.team-hdr:first-child{padding-top:2px}
.t-mini{font-size:10px;color:var(--gt);font-weight:600;letter-spacing:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:5px;margin-bottom:4px}

/* Sticker chips */
.stk{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;border:0.5px solid var(--bd);height:64px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;background:var(--s2);transition:transform .1s;position:relative;padding:0 2px}
.stk:active{transform:scale(.88)}
.stk.have{background:var(--gbg);border-color:var(--gbr);border-width:1px}
.stk.rep{background:var(--abg);border-color:var(--abr);border-width:1px}
.sid{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;margin-top:2px}
.stk.have .sid{color:var(--gt)}.stk.rep .sid{color:var(--at)}
.sname{font-size:9px;color:var(--t3);text-align:center;margin-top:2px;line-height:1.2;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stk.have .sname{color:#86efac}.stk.rep .sname{color:#fdba74}
.scnt{font-size:10px;color:var(--t3);margin-top:2px}
.stk.have .scnt{color:var(--gbr)}.stk.rep .scnt{color:var(--at);font-weight:700}
.foil-dot{width:6px;height:6px;border-radius:50%;background:var(--foil);position:absolute;top:4px;right:4px;box-shadow:0 0 4px rgba(245,224,112,0.6)}
/* Minus button on owned stickers */
.stk-rm{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,0.5);border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-size:11px;line-height:14px;text-align:center;display:none;cursor:pointer;z-index:2}
.stk.have .stk-rm,.stk.rep .stk-rm{display:block}
.no-r{text-align:center;padding:2rem;color:var(--t3);font-size:13px;grid-column:1/-1}

/* Bottom bar */
.bbar{display:flex;gap:7px;padding:8px 14px;background:var(--s1);border-top:0.5px solid var(--bd);flex-shrink:0}
.abt{flex:1;font-size:11px;font-weight:500;padding:8px 5px;border-radius:10px;border:0.5px solid var(--bd2);background:var(--s2);color:var(--t2);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.abt.dng{color:var(--rt);border-color:var(--rbr)}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end}
.modal-ov.open{display:flex}
.modal{background:var(--s1);border:0.5px solid var(--bd2);border-radius:18px 18px 0 0;width:100%;max-height:60dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:0.5px solid var(--bd)}
.mtitle{font-size:14px;font-weight:600;color:var(--t)}
.mclose{font-size:22px;color:var(--t3);cursor:pointer;padding:4px;line-height:1}
.mbody{overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;flex:1}
.tgrid{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.tm{background:var(--rbg);color:var(--rt);border:0.5px solid var(--rbr)}
.ta{background:var(--abg);color:var(--at);border:0.5px solid var(--abr)}
.empty{color:var(--t3);font-size:13px;text-align:center;padding:2rem}
</style>
</head>

Lamine Yamal","f":false},{"id":"CC2","n":"Lautaro Martínez","f":false},{"id":"CC3","n":"Harry Kane","f":false},{"id":"CC4","n":"Joshua Kimmich","f":false},{"id":"CC5","n":"Vinicius Jr.","f":false},{"id":"CC6","n":"Kylian Mbappé","f":false},{"id":"CC7","n":"Pedri","f":false},{"id":"CC8","n":"Cristiano Ronaldo","f":false},{"id":"CC9","n":"Lionel Messi","f":false},{"id":"CC10","n":"Rodri","f":false},{"id":"CC11","n":"Mohamed Salah","f":false},{"id":"CC12","n":"Erling Haaland","f":false}]}];
const ALL = SECTIONS.flatMap(sec => sec.stickers.map(st => ({...st, sec:sec.code, secName:sec.name})));
const TOTAL = ALL.length;

// Populate team selector
const sel = document.getElementById('team-sel');
SECTIONS.forEach(sec => {
  const o = document.createElement('option');
  o.value = sec.code; o.textContent = sec.code + ' · ' + sec.name;
  sel.appendChild(o);
});

let owned = {}, filter = 'all', team = 'all', search = '';

function load() {
  try { const r = localStorage.getItem('panini-2026'); if(r) owned = JSON.parse(r); } catch(e) {}
  render();
}

function save() {
  try { localStorage.setItem('panini-2026', JSON.stringify(owned)); } catch(e) {}
}

function stats() {
  const hv = Object.keys(owned).filter(k => owned[k] > 0).length;
  const rp = Object.values(owned).filter(v => v > 1).length;
  return { hv, rp, ms: TOTAL - hv, pct: Math.round(hv / TOTAL * 100) };
}

function updateHdr() {
  const s = stats();
  document.getElementById('pct').textContent = s.pct + '%';
  document.getElementById('pf').style.width = s.pct + '%';
  document.getElementById('s-hv').textContent = s.hv;
  document.getElementById('s-ms').textContent = s.ms;
  document.getElementById('s-rp').textContent = s.rp;
}

function getFiltered() {
  const q = search.toLowerCase();
  return ALL.filter(st => {
    const cnt = owned[st.id] || 0;
    if(q && !st.id.toLowerCase().includes(q) && !st.n.toLowerCase().includes(q) && !st.secName.toLowerCase().includes(q)) return false;
    if(team !== 'all' && st.sec !== team) return false;
    if(filter === 'tengo' && cnt === 0) return false;
    if(filter === 'faltan' && cnt > 0) return false;
    if(filter === 'rep' && cnt <= 1) return false;
    return true;
  });
}

function render() {
  updateHdr();
  const list = getFiltered();
  document.getElementById('cbar').textContent = list.length + ' láminas';
  const wrap = document.getElementById('gwrap');
  if(!list.length) { wrap.innerHTML = '<div class="no-r">Sin resultados</div>'; return; }
  const grouped = {};
  list.forEach(st => {
    if(!grouped[st.sec]) grouped[st.sec] = {name:st.secName, items:[]};
    grouped[st.sec].items.push(st);
  });
  const frag = document.createDocumentFragment();
  Object.entries(grouped).forEach(([code, {name, items}]) => {
    const hv = items.filter(st => (owned[st.id]||0) > 0).length;
    const wrap2 = document.createElement('div');
    wrap2.innerHTML = `<div class="team-hdr"><span>${code} · ${name}</span><span class="t-mini">${hv}/${items.length}</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach(st => buildChip(st, grid));
    wrap2.appendChild(grid);
    frag.appendChild(wrap2);
  });
  wrap.innerHTML = '';
  wrap.appendChild(frag);
  if(search) {
    const first = wrap.querySelector('.stk');
    if(first) first.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

function buildChip(st, parent) {
  const cnt = owned[st.id] || 0;
  const s = document.createElement('div');
  s.className = 'stk' + (cnt===0?'':cnt===1?' have':' rep');
  s.dataset.id = st.id;
  s.innerHTML =
    (st.f ? '<div class="foil-dot"></div>' : '') +
    (cnt > 0 ? '<div class="stk-rm" title="Quitar una">✕</div>' : '') +
    `<div class="sid">${st.id}</div>` +
    `<div class="sname">${st.n}</div>` +
    `<div class="scnt">${cnt===0?'—':cnt===1?'✓':'×'+cnt}</div>`;
  // Tap = add
  s.addEventListener('click', e => {
    if(e.target.classList.contains('stk-rm')) { e.stopPropagation(); rm(st.id); return; }
    tap(st.id);
  });
  // Long press = remove
  let ht;
  s.addEventListener('touchstart', () => { ht = setTimeout(() => rm(st.id), 600); }, {passive:true});
  s.addEventListener('touchend', () => clearTimeout(ht), {passive:true});
  s.addEventListener('contextmenu', e => { e.preventDefault(); rm(st.id); });
  parent.appendChild(s);
}

function updateChip(id) {
  const el = document.querySelector(`.stk[data-id="${id}"]`);
  if(!el) return;
  const cnt = owned[id] || 0;
  const hide = (filter==='faltan'&&cnt>0)||(filter==='tengo'&&cnt===0)||(filter==='rep'&&cnt<=1);
  if(hide) { el.remove(); updateHdr(); return; }
  // Rebuild chip content
  const st = ALL.find(s => s.id === id);
  if(!st) return;
  el.className = 'stk' + (cnt===0?'':cnt===1?' have':' rep');
  el.innerHTML =
    (st.f ? '<div class="foil-dot"></div>' : '') +
    (cnt > 0 ? '<div class="stk-rm" title="Quitar una">✕</div>' : '') +
    `<div class="sid">${st.id}</div>` +
    `<div class="sname">${st.n}</div>` +
    `<div class="scnt">${cnt===0?'—':cnt===1?'✓':'×'+cnt}</div>`;
  updateHdr();
}

function tap(id) {
  owned[id] = (owned[id]||0)+1;
  save(); updateChip(id);
}

function rm(id) {
  if(!owned[id]) return;
  owned[id]--;
  if(owned[id]===0) delete owned[id];
  save(); updateChip(id);
}

function setFilter(f) {
  filter = f;
  ['all','tengo','faltan','rep'].forEach(x => {
    const b = document.getElementById('f-'+x);
    if(b) b.className = b.className.replace(/ on/,'') + (f===x?' on':'');
  });
  render();
}

function setTeam(t) { team = t; render(); }

function clearSearch() {
  search = ''; document.getElementById('srch').value = ''; render();
}

document.getElementById('srch').addEventListener('input', e => {
  search = e.target.value.trim(); render();
});

function openModal(type) {
  const t = document.getElementById('mtitle'), b = document.getElementById('mbody');
  if(type === 'f') {
    const ms = ALL.filter(st => !(owned[st.id]));
    t.textContent = `Faltantes (${ms.length})`;
    b.innerHTML = ms.length ? ms.map(st => `<span class="tag tm">${st.id}</span>`).join('') : '<div class="empty">¡Álbum completo! 🏆</div>';
  } else {
    const rp = ALL.filter(st => (owned[st.id]||0) > 1);
    t.textContent = `Repetidas (${rp.length})`;
    b.innerHTML = rp.length ? rp.map(st => `<span class="tag ta">${st.id} ×${owned[st.id]}</span>`).join('') : '<div class="empty">Sin repetidas aún</div>';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if(!e || e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

function resetAll() {
  if(!confirm('¿Reiniciar todo el álbum? Se perderá el progreso.')) return;
  owned = {}; save(); render();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
load();
</script>
